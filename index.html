<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .main {
            display: flex;
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .left {
            width: 20%;
            height: 100%;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .left button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 10px gray;
            cursor: pointer;
        }

        .middle {
            width: 60%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .call3 {
            width: 320px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px gray;
            background: #e3e3e3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }

        .cardBtns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .cardBtns a {
            padding: 8px 12px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .right {
            width: 20%;
            height: 100%;
            background: #f0f0f0;
        }

        form {
            position: absolute;
            top: 20px;
            left: 25%;
            display: none;
            flex-direction: column;
            gap: 10px;
            background: darkslategray;
            padding: 20px;
            color: white;
            width: 50%;
        }

        form input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        form button {
            padding: 10px;
            cursor: pointer;
        }

        .close {
            display: flex;
            justify-content: end;
        }

        .close button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid white;
            background: darkslategray;
            color: white;
        }
    </style>
</head>

<body>

    <div class="main">

        <div class="left">
            <button class="add">+</button>
            <button class="up">up</button>
            <button class="down">down</button>
        </div>

        <div class="middle">
            <div class="call3"></div>
        </div>

        <div class="right"></div>

    </div>

    <form>

        <div class="close">
            <button>x</button>
        </div>

        <input type="text" placeholder="Name">
        <input type="text" placeholder="Email">
        <input type="text" placeholder="Phone">
        <input type="text" placeholder="Image Link">

        <div>

            <p>Select Gender:</p>

            <label>
                <input type="radio" name="gender" value="male"> Male
            </label>

            <label>
                <input type="radio" name="gender" value="female"> Female
            </label>

            <label>
                <input type="radio" name="gender" value="other"> Other
            </label>

        </div>

        <button type="submit">Submit</button>

    </form>

    <script>

        let form = document.querySelector("form")
        let closeBtn = document.querySelector(".close button")
        let add = document.querySelector(".add")
        let upBtn = document.querySelector(".up")
        let downBtn = document.querySelector(".down")
        let card = document.querySelector(".call3")

        let users = JSON.parse(localStorage.getItem("user")) || []
        let currentIndex = users.length - 1

        function showNoData() {
            card.innerHTML = "<h2>No user data</h2>"
        }

        closeBtn.addEventListener("click", function (e) {
            e.preventDefault()
            form.style.display = "none"
        })

        add.addEventListener("click", function (e) {
            e.preventDefault()
            form.style.display = "flex"
        })

        form.addEventListener("submit", function (e) {

            e.preventDefault()

            let name = form.querySelectorAll("input")[0].value.trim()
            let email = form.querySelectorAll("input")[1].value.trim()
            let phone = form.querySelectorAll("input")[2].value.trim()
            let img = form.querySelectorAll("input")[3].value.trim()

            let gender = document.querySelector('input[name="gender"]:checked')?.value

            if (name === "") { alert("enter name"); return }
            if (email === "") { alert("enter email"); return }
            if (phone === "") { alert("enter phone"); return }
            if (img === "") { alert("enter image link"); return }
            if (!gender) { alert("select gender"); return }

            let newUser = {
                name: name,
                email: email,
                phone: phone,
                img: img,
                gender: gender
            }

            users.push(newUser)

            localStorage.setItem("user", JSON.stringify(users))

            currentIndex = users.length - 1

            showUser(users[currentIndex])

            form.querySelectorAll("input")[0].value = ""
            form.querySelectorAll("input")[1].value = ""
            form.querySelectorAll("input")[2].value = ""
            form.querySelectorAll("input")[3].value = ""

            document.querySelectorAll('input[name="gender"]').forEach(function (r) {
                r.checked = false
            })

            form.style.display = "none"

        })

        function showUser(user) {

            card.innerHTML = `
<img src="${user.img}">
<h2>${user.name}</h2>
<p>${user.email}</p>
<p>${user.phone}</p>
<p>Gender : ${user.gender}</p>

<div class="cardBtns">
<a href="tel:${user.phone}">Call</a>
<a href="sms:${user.phone}">Message</a>
</div>
`

        }

        if (users.length > 0) {
            showUser(users[currentIndex])
        } else {
            showNoData()
        }

        upBtn.addEventListener("click", function () {

            if (currentIndex > 0) {
                currentIndex--
                showUser(users[currentIndex])
            }

        })

        downBtn.addEventListener("click", function () {

            if (currentIndex < users.length - 1) {
                currentIndex++
                showUser(users[currentIndex])
            }

        })

    </script>

</body>

</html>
